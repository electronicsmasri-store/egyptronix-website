<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Egyptronix</title>
  <link rel="icon" type="image/png" href="../Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="details-body">
  <img class="body-bg-image" src="../Logo.png" alt="Egyptronix background">
  <div class="page-bg"></div>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Back to Egyptronix Home">
      <img src="../Egyptronix.png" alt="Egyptronix logo">
      <span>Egyptronix</span>
    </a>
    <a class="btn btn-ghost" href="index.html#products">Back to Products</a>
  </header>

  <main class="details-main">
    <article id="detailsCard" class="card details-card">
      <p class="kicker">Product Details</p>
      <h1 id="detailsName">Loading...</h1>
      <p id="detailsCategory" class="pill">Category</p>
      <img id="detailsImage" class="details-product-image hidden" alt="Product photo">
      <p id="detailsDescription"></p>
      <p id="detailsPrice" class="price-note hidden"></p>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Egyptronix</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="details-body">
    <img class="body-bg-image" src="Logo.png" alt="Egyptronix background">
    <div class="page-bg"></div>
    <header class="topbar">
        <a class="brand" href="index.html" aria-label="Back to Egyptronix Home">
            <img src="Egyptronix.png" alt="Egyptronix logo">
            <span>Egyptronix</span>
        </a>
        <a class="btn btn-ghost" href="index.html#products">Back to Products</a>
    </header>

    <main class="details-main">
        <article id="detailsCard" class="card details-card">
            <p class="kicker">Product Details</p>
            <h1 id="detailsName">TA800 25W Charger</h1>
            <p id="detailsCategory" class="pill">Power System</p>
            
            <img id="detailsImage" src="TA800-25W.png" class="details-product-image" alt="TA800-25W EU Charger">
            
            <p id="detailsDescription">Original Samsung 25W PD Power Adapter. Provides super fast and stable charging for all compatible Android and iPhone devices.</p>
            
            <p id="detailsPrice" class="price-note">Price: $19.50</p>
        </article>
    </main>
</body>
</html>
